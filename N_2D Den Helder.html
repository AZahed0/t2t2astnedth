<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Den Helder</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.1/MarkerCluster.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.1/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-search@3.0.9/dist/leaflet-search.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* CSS Variables for consistent styling */
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e74c3c;
            --light-gray: #ecf0f1;
            --dark-gray: #7f8c8d;
        }

        #map {
            height: 100vh;
            width: 100%;
        }

        /* Control Panel positioning and styling */
        .control-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            width: 180px;
            transition: height 0.3s ease;
        }

        .control-panel.collapsed {
            height: 40px;
            overflow: hidden;
        }

        .control-panel h3 {
            margin: 0 0 10px;
            font-size: 16px;
            font-weight: 600;
            color: var(--primary-color);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .control-panel h3 i {
            margin-right: 5px;
        }

        .control-panel h3::after { content: '▲'; }
        .control-panel.collapsed h3::after { content: '▼'; }

        .control-panel label {
            display: block;
            font-size: 12px;
            color: var(--dark-gray);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .control-panel label i { font-size: 14px; }

        #color-selector input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            cursor: pointer;
            border-radius: 50%;
            padding: 2px;
            margin-bottom: 10px;
        }
        #color-selector input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        #color-selector input[type="color"]::-webkit-color-swatch { border: 2px solid #fff; border-radius: 50%; }

        #opacity-slider input { width: 100%; }

        .control-button {
            display: flex;
            align-items: center;
            gap: 5px;
            width: 100%;
            padding: 8px 10px;
            background: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            text-align: left;
            margin: 5px 0;
            transition: all 0.2s ease;
        }
        .control-button i { font-size: 14px; }
        .control-button:hover { background: #2980b9; transform: translateY(-2px); }

        .clear-button { background: var(--accent-color); }
        .clear-button:hover { background: #c0392b; }

        /* Search Bar positioning and styling */
        .leaflet-search-bar {
            position: absolute;
            bottom: 30px;
            left: 5px;
            z-index: 1000;
            background: white;
            border-radius: 12px;
            padding: 7px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            width: 200px;
        }

        .leaflet-search-bar .search-content { display: flex; align-items: center; gap: 5px; }
        .leaflet-search-input {
            width: 120px;
            border: 1px solid var(--light-gray);
            border-radius: 5px;
            padding: 4px;
            font-size: 10px;
        }
        .leaflet-search-button {
            background: var(--secondary-color);
            color: white; border: none; border-radius: 5px;
            padding: 4px; font-size: 10px; cursor: pointer;
            transition: all 0.2s ease; display: flex; align-items: center;
            justify-content: center; width: 24px; height: 24px;
        }
        .leaflet-search-button i { font-size: 12px; }
        .leaflet-search-button:hover { background: #2980b9; transform: translateY(-2px); }

        .leaflet-search-cancel {
            display: none; background: var(--light-gray); color: var(--dark-gray);
            border: none; border-radius: 5px; padding: 4px; font-size: 10px;
            cursor: pointer; align-items: center; justify-content: center;
            width: 24px; height: 24px; transition: all 0.2s ease;
        }
        .leaflet-search-cancel i { font-size: 12px; }
        .leaflet-search-cancel:hover { background: #d0d4d6; transform: translateY(-2px); }
        .leaflet-search-bar.searching .leaflet-search-cancel { display: inline-flex; }

        #search-results {
            position: absolute; bottom: 100%; left: 0; background: white;
            border-radius: 12px; box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            z-index: 1001; max-height: 180px; overflow-y: auto; width: 100%; display: none;
        }
        #search-results ul { list-style: none; padding: 0; margin: 0; }
        #search-results li { padding: 5px; cursor: pointer; font-size: 10px; border-bottom: 1px solid var(--light-gray); }
        #search-results li:hover { background: var(--light-gray); }
        #search-results li:last-child { border-bottom: none; }

        .legend { background: white; padding: 10px; border-radius: 12px; box-shadow: 0 6px 20px rgba(0,0,0,0.1); font-size: 14px; color: var(--dark-gray); }
        .legend h4 { margin: 0 0 8px; font-size: 16px; font-weight: bold; }
        .legend i { width: 16px; height: 16px; float: left; margin-right: 8px; opacity: 0.8; border-radius: 50%; border: 2px solid; box-shadow: 1px 1px 2px rgba(0,0,0,0.2); }

        .leaflet-control-zoom, .leaflet-control-layers { border-radius: 12px; box-shadow: 0 6px 20px rgba(0,0,0,0.1); background: white; }
        .leaflet-control-zoom-in, .leaflet-control-zoom-out {
            width: 40px; height: 40px; line-height: 40px; text-align: center;
            font-size: 24px; cursor: pointer; background: white;
            border: 1px solid var(--light-gray); border-radius: 12px 12px 0 0; color: var(--dark-gray);
        }
        .leaflet-control-zoom-out { border-radius: 0 0 12px 12px; border-top: none; }
        .leaflet-control-zoom-in:hover, .leaflet-control-zoom-out:hover { background: var(--light-gray); }
        .leaflet-draw-toolbar { top: 80px; }

        @media (max-width: 768px) {
            .control-panel { width: 90%; bottom: 10px; right: auto; left: 5%; }
            .leaflet-search-bar { width: 90%; left: 5%; bottom: 60px; }
            .leaflet-control { margin: 5px !important; }
        }

        #map::after {
            content: 'Sleep GeoJSON of Shapefile hier';
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px; background: rgba(255, 255, 255, 0.9);
            border: 3px dashed var(--secondary-color); border-radius: 10px;
            font-size: 18px; color: var(--primary-color);
            pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 1000;
        }
        #map.drag-over::after { opacity: 1; }

        /* Print styling: verberg alle menu's en toon alleen de kaart op volledige grootte */
        @media print {
            .control-panel, .leaflet-search-bar, .leaflet-control-zoom, .leaflet-control-layers, .leaflet-draw {
                display: none !important;
            }
            #map {
                height: 100vh !important;
                width: 100vw !important;
            }
            @page {
                size: landscape;
                margin: 0;
            }
            body {
                margin: 0;
                padding: 0;
            }
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div class="control-panel collapsed" id="control-panel">
        <h3 onclick="toggleControlPanel()"><i class="fas fa-pencil-alt"></i> Tekentools</h3>
        <div id="color-selector">
            <label><i class="fas fa-palette"></i> Kleur kiezen:</label>
            <input type="color" id="draw-color" value="#0000FF">
        </div>
        <div id="opacity-slider">
            <label><i class="fas fa-adjust"></i> Transparantie:</label>
            <input type="range" id="opacity" min="0" max="1" step="0.1" value="0.7">
        </div>
        
        <button class="control-button" onclick="map.setView([52.9563, 4.7608], 14)"><i class="fas fa-home"></i> Terug naar start</button>
        <button class="control-button" onclick="changeSelectedColor()"><i class="fas fa-fill-drip"></i> Kleur wijzigen</button>
        
        <button class="control-button" onclick="downloadGeoJSON()"><i class="fas fa-download"></i> Download GeoJSON</button>
        <button class="control-button" onclick="downloadShapefile()"><i class="fas fa-download"></i> Download Shapefile</button>
        
        <button class="control-button" onclick="document.getElementById('file-input').click()"><i class="fas fa-upload"></i> Import GeoJSON</button>
        <button class="control-button" onclick="document.getElementById('shp-file-input').click()"><i class="fas fa-upload"></i> Import Shapefile</button>
        
        <input type="file" id="file-input" accept=".geojson,.json" style="display: none;">
        <input type="file" id="shp-file-input" accept=".zip" style="display: none;">
        
        <button class="control-button" onclick="takeScreenshot()"><i class="fas fa-camera"></i> Screenshot</button>
        
        <button class="control-button clear-button" onclick="clearShapes()"><i class="fas fa-trash"></i> Verwijder alles</button>
        <button class="control-button" onclick="undoLastDraw()"><i class="fas fa-undo"></i> Ongedaan maken</button>
    </div>

    <div class="leaflet-search-bar" id="search-bar">
        <div class="search-content">
            <div id="search-results">
                <ul></ul>
            </div>
            <input type="text" class="leaflet-search-input" placeholder="Zoek een adres..." id="search-input">
            <button class="leaflet-search-button" id="search-button"><i class="fas fa-search"></i></button>
            <button class="leaflet-search-cancel" id="search-cancel"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.1/leaflet.markercluster.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-search@3.0.9/dist/leaflet-search.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.7.3/proj4.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shpjs/4.0.2/shp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/shpwrite@1.6.0/dist/shpwrite.js"></script>
    <!-- html2canvas toegevoegd voor de screenshot functionaliteit -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        // Define the Proj4js projection for RD
        proj4.defs('EPSG:28992', '+proj=sterea +lat_0=52.15616055555555 +lon_0=5.38763888888889 +k=0.9999079 +x_0=155000 +y_0=463000 +ellps=bessel +units=m +no_defs');

        var map = L.map('map', {
            zoomControl: true,
            preferCanvas: true
        }).setView([52.9563, 4.7608], 14);

        // Define base map layers (crossOrigin toegevoegd voor screenshots)
        var brtLayer = L.tileLayer('https://service.pdok.nl/brt/achtergrondkaart/wmts/v2_0/standaard/EPSG:3857/{z}/{x}/{y}.png', {
            attribution: 'Kaartgegevens © <a href="https://www.kadaster.nl">Kadaster</a>',
            style: 'standaard',
            crossOrigin: true
        }).addTo(map);

        var googleRoadmap = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            attribution: '© <a href="https://www.google.com/maps">Google Maps</a>',
            crossOrigin: true
        });

        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            crossOrigin: true
        });

        var esriImagery = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: '© Esri',
            crossOrigin: true
        });

        var esriStreet = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', {
            attribution: '© Esri',
            crossOrigin: true
        });

        var esriTopo = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', {
            attribution: '© Esri',
            crossOrigin: true
        });

        var esriImageryLabels = L.layerGroup([
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { crossOrigin: true }),
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { crossOrigin: true })
        ]);

        var baseMaps = {
            "Esri World Imagery": esriImagery,
            "Esri World Street Map": esriStreet,
            "Esri World Topographic Map": esriTopo,
            "Esri Imagery with Labels": esriImageryLabels,
            "Google Roadmap": googleRoadmap,
            "OpenStreetMap (OSM)": osm,
            "BRT-Achtergrondkaart (NL)": brtLayer
        };

        var overlayMaps = {};
        var layerControl = L.control.layers(baseMaps, overlayMaps, { position: 'topright' }).addTo(map);
        L.control.zoom({ position: 'topright' }).addTo(map);
        L.control.scale({ metric: true, imperial: false }).addTo(map);

        const drawnItems = new L.FeatureGroup().addTo(map);
        let drawHistory =[];
        let currentSelectedLayer = null;

        const drawControl = new L.Control.Draw({
            draw: {
                polygon: {
                    allowIntersection: false,
                    drawError: { color: '#b00b00', message: '<strong>Fout:</strong> Geen kruisingen toegestaan!' },
                    shapeOptions: { color: '#0000FF', fillColor: '#0000FF', fillOpacity: 0.7, weight: 2 }
                },
                polyline: { color: '#0000FF', weight: 3, lineCap: 'round' },
                circle: { shapeOptions: { color: '#0000FF', fillColor: '#0000FF', fillOpacity: 0.7, weight: 2 } },
                marker: { icon: new L.Icon.Default() },
                rectangle: { shapeOptions: { color: '#0000FF', fillColor: '#0000FF', fillOpacity: 0.7, weight: 2 } }
            },
            edit: {
                featureGroup: drawnItems,
                remove: true
            }
        });
        map.addControl(drawControl);

        const colorPicker = document.getElementById('draw-color');
        const opacitySlider = document.getElementById('opacity');

        function updateDrawControlOptions() {
            const color = colorPicker.value;
            const opacity = parseFloat(opacitySlider.value);
            drawControl.setDrawingOptions({
                polygon: { shapeOptions: { color: color, fillColor: color, fillOpacity: opacity, weight: 2 } },
                polyline: { color: color, weight: 3, lineCap: 'round' },
                circle: { shapeOptions: { color: color, fillColor: color, fillOpacity: opacity, weight: 2 } },
                rectangle: { shapeOptions: { color: color, fillColor: color, fillOpacity: opacity, weight: 2 } }
            });
        }

        colorPicker.addEventListener('change', function(event) {
            updateDrawControlOptions();
            const newColor = this.value;

            if (currentSelectedLayer && currentSelectedLayer instanceof L.Path) {
                const newOpacity = parseFloat(opacitySlider.value);
                currentSelectedLayer.setStyle({
                    color: newColor, fillColor: newColor, fillOpacity: newOpacity,
                    weight: currentSelectedLayer instanceof L.Polyline ? 3 : 2
                });
                currentSelectedLayer.options.customStyle = {
                    color: newColor, fillColor: newColor, fillOpacity: newOpacity,
                    weight: currentSelectedLayer instanceof L.Polyline ? 3 : 2
                };
                if (!currentSelectedLayer.feature) {
                    currentSelectedLayer.feature = { type: 'Feature', properties: {}, geometry: currentSelectedLayer.toGeoJSON().geometry };
                }
                if (!currentSelectedLayer.feature.properties) currentSelectedLayer.feature.properties = {};
                currentSelectedLayer.feature.properties.color = newColor;
                currentSelectedLayer.feature.properties.fillColor = newColor;
                currentSelectedLayer.feature.properties.fillOpacity = newOpacity;
            }
        });

        opacitySlider.addEventListener('input', function() {
            updateDrawControlOptions();
            const newOpacity = parseFloat(this.value);

            if (currentSelectedLayer && currentSelectedLayer instanceof L.Path) {
                const color = colorPicker.value;
                currentSelectedLayer.setStyle({
                    color: color, fillColor: color, fillOpacity: newOpacity,
                    weight: currentSelectedLayer instanceof L.Polyline ? 3 : 2
                });
                currentSelectedLayer.options.customStyle = {
                    color: color, fillColor: color, fillOpacity: newOpacity,
                    weight: currentSelectedLayer instanceof L.Polyline ? 3 : 2
                };
                if (!currentSelectedLayer.feature) {
                    currentSelectedLayer.feature = { type: 'Feature', properties: {}, geometry: currentSelectedLayer.toGeoJSON().geometry };
                }
                 if (!currentSelectedLayer.feature.properties) currentSelectedLayer.feature.properties = {};
                currentSelectedLayer.feature.properties.fillOpacity = newOpacity;
            }
        });

        function changeSelectedColor() {
            if (!currentSelectedLayer) {
                alert('Selecteer eerst een vorm door erop te klikken');
                return;
            }

            const newColor = colorPicker.value;
            const newOpacity = parseFloat(opacitySlider.value);

            if (currentSelectedLayer instanceof L.Path) {
                currentSelectedLayer.setStyle({
                    color: newColor, fillColor: newColor, fillOpacity: newOpacity,
                    weight: currentSelectedLayer instanceof L.Polyline ? 3 : 2
                });

                currentSelectedLayer.options.customStyle = {
                    color: newColor, fillColor: newColor, fillOpacity: newOpacity,
                    weight: currentSelectedLayer instanceof L.Polyline ? 3 : 2
                };

                if (!currentSelectedLayer.feature) {
                    currentSelectedLayer.feature = { type: 'Feature', properties: {}, geometry: currentSelectedLayer.toGeoJSON().geometry };
                }
                currentSelectedLayer.feature.properties.color = newColor;
                currentSelectedLayer.feature.properties.fillColor = newColor;
                currentSelectedLayer.feature.properties.fillOpacity = newOpacity;
            }
        }

        map.on('click', function(e) {
            if (currentSelectedLayer) {
                if (currentSelectedLayer instanceof L.Path && currentSelectedLayer.options.customStyle) {
                    currentSelectedLayer.setStyle(currentSelectedLayer.options.customStyle);
                } else {
                    if (currentSelectedLayer instanceof L.Path) {
                        currentSelectedLayer.setStyle({ weight: currentSelectedLayer instanceof L.Polyline ? 3 : 2 });
                    }
                }
            }
            currentSelectedLayer = null;

            drawnItems.eachLayer(function(layer) {
                if (layer instanceof L.Path && layer.getBounds && layer.getBounds().contains(e.latlng)) {
                    currentSelectedLayer = layer;
                } else if (layer instanceof L.Marker && layer.getLatLng().distanceTo(e.latlng) < 20) {
                    currentSelectedLayer = layer;
                }
            });

            if (currentSelectedLayer && currentSelectedLayer instanceof L.Path) {
                currentSelectedLayer.setStyle({ weight: 5, color: '#FFFF00' });
                currentSelectedLayer.bringToFront();
            }
        });

        map.on('draw:created', (e) => {
            const layer = e.layer;
            const currentColor = colorPicker.value;
            const currentOpacity = parseFloat(opacitySlider.value);

            if (layer instanceof L.Path) {
                layer.setStyle({
                    color: currentColor, fillColor: currentColor, fillOpacity: currentOpacity,
                    weight: layer instanceof L.Polyline ? 3 : 2
                });
                layer.options.customStyle = {
                    color: currentColor, fillColor: currentColor, fillOpacity: currentOpacity,
                    weight: layer instanceof L.Polyline ? 3 : 2
                };
                if (!layer.feature) {
                    layer.feature = { type: 'Feature', properties: {}, geometry: layer.toGeoJSON().geometry };
                }
                layer.feature.properties.color = currentColor;
                layer.feature.properties.fillColor = currentColor;
                layer.feature.properties.fillOpacity = currentOpacity;
            } else if (layer instanceof L.Marker) {
                  if (!layer.feature) {
                      layer.feature = { type: 'Feature', properties: {}, geometry: layer.toGeoJSON().geometry };
                  }
                  layer.feature.properties.type = 'standard_marker';
             }

            drawnItems.addLayer(layer);
            drawHistory.push(layer);

             layer.on('click', function(e) {
                  L.DomEvent.stopPropagation(e);
                  if (currentSelectedLayer) {
                       if (currentSelectedLayer instanceof L.Path && currentSelectedLayer.options.customStyle) {
                            currentSelectedLayer.setStyle(currentSelectedLayer.options.customStyle);
                        } else {
                             if (currentSelectedLayer instanceof L.Path) {
                                  currentSelectedLayer.setStyle({ weight: currentSelectedLayer instanceof L.Polyline ? 3 : 2 });
                             }
                        }
                  }
                  currentSelectedLayer = this;
                  if (currentSelectedLayer instanceof L.Path) {
                      currentSelectedLayer.setStyle({ weight: 5, color: '#FFFF00' });
                      currentSelectedLayer.bringToFront();
                  }
             });
        });

        map.on('draw:edited', (e) => {
            e.layers.eachLayer((layer) => {
                if (layer.options.customStyle) {
                    layer.setStyle(layer.options.customStyle);
                }
            });
        });

        map.on('draw:deleted', (e) => {
            e.layers.eachLayer((layer) => {
                if (layer === currentSelectedLayer) {
                    currentSelectedLayer = null;
                }
                drawHistory = drawHistory.filter(l => l !== layer);
            });
        });

        function toggleControlPanel() {
            const panel = document.getElementById('control-panel');
            panel.classList.toggle('collapsed');
        }

        // --- Screenshot Functie ---
        function takeScreenshot() {
            // Voorkom fouten doordat de map bezig is met laden
            const mapElement = document.getElementById('map');
            
            // Verberg tijdelijk control panels voor een schonere screenshot als je dat wil,
            // of laat html2canvas het doen via ignoreElements.
            html2canvas(mapElement, {
                useCORS: true, 
                allowTaint: false,
                ignoreElements: (element) => {
                    // Negeer de UI menu's in de afbeelding
                    return element.classList.contains('control-panel') || 
                           element.classList.contains('leaflet-search-bar') ||
                           element.classList.contains('leaflet-control-container');
                }
            }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                
                const newWindow = window.open('', '_blank');
                if (newWindow) {
                    newWindow.document.write(`
                        <!DOCTYPE html>
                        <html lang="nl">
                        <head>
                            <meta charset="UTF-8">
                            <title>Map Screenshot</title>
                            <style>
                                body {
                                    margin: 0;
                                    padding: 20px;
                                    display: flex;
                                    flex-direction: column;
                                    align-items: center;
                                    background-color: #ecf0f1;
                                    font-family: Arial, sans-serif;
                                }
                                h2 { color: #2c3e50; }
                                p { color: #7f8c8d; margin-bottom: 20px;}
                                img {
                                    max-width: 100%;
                                    border: 2px solid #bdc3c7;
                                    border-radius: 8px;
                                    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
                                }
                            </style>
                        </head>
                        <body>
                            <h2>Kaart Screenshot</h2>
                            <p>Klik met de rechtermuisknop op de afbeelding en kies <strong>"Afbeelding opslaan als..."</strong> om hem te downloaden.</p>
                            <img src="${imgData}" alt="Map Screenshot">
                        </body>
                        </html>
                    `);
                    newWindow.document.close();
                } else {
                    alert('Pop-ups worden geblokkeerd. Sta pop-ups toe om de screenshot te openen.');
                }
            }).catch(error => {
                console.error("Screenshot error:", error);
                alert("Er is een fout opgetreden bij het maken van de screenshot. Zorg dat de kaarttegels geladen zijn.");
            });
        }

        function downloadGeoJSON() {
            const layers = drawnItems.getLayers();
            if (layers.length === 0) {
                alert('Geen objecten om te exporteren.');
                return;
            }

            const featureCollection = {
                type: "FeatureCollection",
                features:[]
            };

            layers.forEach(layer => {
                let feature = layer.toGeoJSON();

                if (feature.type !== 'Feature') {
                    feature = { type: "Feature", geometry: feature, properties: {} };
                }

                if (!feature.properties) feature.properties = {};

                if (layer.options && layer.options.customStyle) {
                    feature.properties.color = layer.options.customStyle.color;
                    feature.properties.fillColor = layer.options.customStyle.fillColor;
                    feature.properties.fillOpacity = layer.options.customStyle.fillOpacity;
                    feature.properties.weight = layer.options.customStyle.weight;
                }

                if (layer.feature && layer.feature.properties) {
                    Object.assign(feature.properties, layer.feature.properties);
                }

                featureCollection.features.push(feature);
            });

            const geojsonStr = JSON.stringify(featureCollection).replace(/</g, '\\u003c');

            const newWindow = window.open('', '_blank');
            if (newWindow) {
                newWindow.document.write(`
                    <!DOCTYPE html>
                    <html lang="nl">
                    <head>
                        <meta charset="UTF-8">
                        <title>Download GeoJSON</title>
                        <style>
                            body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #ecf0f1; font-family: Arial, sans-serif; }
                            .download-btn { background-color: #3498db; color: white; padding: 15px 30px; text-decoration: none; border-radius: 8px; font-size: 18px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; border: none; }
                            .download-btn:hover { background-color: #2980b9; }
                        </style>
                    </head>
                    <body>
                        <button id="dl-btn" class="download-btn">Download hier</button>
                        <script>
                            const data = ${geojsonStr};
                            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/geo+json' });
                            const url = URL.createObjectURL(blob);
                            const btn = document.getElementById('dl-btn');
                            btn.addEventListener('click', () => {
                                const a = document.createElement('a');
                                a.href = url;
                                a.download = 'drawn_features.geojson';
                                document.body.appendChild(a);
                                a.click();
                                document.body.removeChild(a);
                            });
                        <\/script>
                    </body>
                    </html>
                `);
                newWindow.document.close();
            } else {
                alert('Pop-ups worden geblokkeerd. Sta pop-ups toe in uw browser om de downloadpagina te openen.');
            }
        }

        function downloadShapefile() {
            window.open('https://mapshaper.org', '_blank');
        }

        function clearShapes() {
            if (confirm('Weet je zeker dat je alle getekende objecten wilt verwijderen?')) {
                drawnItems.clearLayers();
                drawHistory =[];
                currentSelectedLayer = null;
            }
        }

        function undoLastDraw() {
            if (drawHistory.length > 0) {
                const lastLayer = drawHistory.pop();
                drawnItems.removeLayer(lastLayer);
                if (lastLayer === currentSelectedLayer) {
                    currentSelectedLayer = null;
                }
            } else {
                alert('Geen objecten om ongedaan te maken.');
            }
        }

        const searchInput = document.getElementById('search-input');
        const searchButton = document.querySelector('.leaflet-search-button');
        const searchCancel = document.querySelector('.leaflet-search-cancel');
        const searchBar = document.getElementById('search-bar');
        const searchResultsContainer = document.getElementById('search-results');
        const searchResultsList = document.querySelector('#search-results ul');
        let currentSearch = null;

        searchInput.addEventListener('input', () => {
            const searchTerm = searchInput.value.trim();
            searchCancel.style.display = searchTerm ? 'inline-flex' : 'none';
            searchResultsContainer.style.display = searchTerm ? 'block' : 'none';

            if (searchTerm.length < 3) { searchResultsList.innerHTML = ''; return; }
            if (currentSearch) clearTimeout(currentSearch);

            currentSearch = setTimeout(() => {
                fetch(`https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&q=${encodeURIComponent(searchTerm)}&countrycodes=nl`)
                    .then(response => response.json())
                    .then(data => {
                        if (data && data.length > 0) {
                            const results = data.map(item => ({ name: item.display_name, center: L.latLng(item.lat, item.lon), properties: item }));
                            displaySearchResults(results);
                        } else {
                            searchResultsList.innerHTML = '<li>Geen resultaten gevonden</li>';
                        }
                    }).catch(error => console.error('Fout:', error));
            }, 300);
        });

        function displaySearchResults(results) {
            searchResultsList.innerHTML = '';
            results.forEach(result => {
                const li = document.createElement('li');
                li.textContent = result.name;
                li.addEventListener('click', () => {
                    searchInput.value = result.name;
                    searchResultsContainer.style.display = 'none';
                    const rdCoords = proj4('EPSG:4326', 'EPSG:28992',[result.center.lng, result.center.lat]);
                    const marker = L.marker(result.center, { icon: new L.Icon.Default() }).bindPopup(result.name + '<br/>RD X: ' + rdCoords[0].toFixed(2) + '<br/>RD Y: ' + rdCoords[1].toFixed(2));
                    drawnItems.addLayer(marker); drawHistory.push(marker);
                    marker.openPopup(); map.setView(result.center, 16);
                });
                searchResultsList.appendChild(li);
            });
            searchResultsContainer.style.display = 'block';
        }

        searchButton.addEventListener('click', () => {
            const searchTerm = searchInput.value.trim();
            if (searchTerm) {
                searchBar.classList.add('searching');
                fetch(`https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&q=${encodeURIComponent(searchTerm)}&countrycodes=nl`)
                    .then(response => response.json())
                    .then(data => {
                        if (data && data.length > 0) {
                            const result = data.map(item => ({ name: item.display_name, center: L.latLng(item.lat, item.lon), properties: item }))[0];
                            const latlng = result.center;
                            const rdCoords = proj4('EPSG:4326', 'EPSG:28992',[latlng.lng, latlng.lat]);
                            const marker = L.marker(latlng, { icon: new L.Icon.Default() }).bindPopup(result.name + '<br/>RD X: ' + rdCoords[0].toFixed(2) + '<br/>RD Y: ' + rdCoords[1].toFixed(2));
                            drawnItems.addLayer(marker); drawHistory.push(marker);
                            marker.openPopup(); map.setView(L.latLng(latlng), 16);
                        } else {
                            alert('Locatie niet gevonden');
                        }
                        searchBar.classList.remove('searching'); searchCancel.style.display = 'none';
                    }).catch(error => {
                        console.error('Fout:', error); alert('Er is een fout opgetreden tijdens het zoeken');
                        searchBar.classList.remove('searching'); searchCancel.style.display = 'none';
                    });
            }
        });

        searchCancel.addEventListener('click', () => {
            searchInput.value = ''; searchBar.classList.remove('searching');
            searchCancel.style.display = 'none'; searchResultsContainer.style.display = 'none'; searchResultsList.innerHTML = '';
        });

        function loadGeoJSON(geojson) {
            const geojsonLayer = L.geoJSON(geojson, {
                style: function(feature) {
                    const color = feature.properties?.color || colorPicker.value;
                    return {
                        color: color,
                        fillColor: feature.properties?.fillColor || color,
                        fillOpacity: feature.properties?.fillOpacity || parseFloat(opacitySlider.value),
                        weight: feature.geometry.type === 'LineString' ? 3 : 2
                    };
                },
                onEachFeature: function(feature, layer) {
                    if (feature.properties) {
                        let popupContent = '';
                        for (const key in feature.properties) {
                            popupContent += `<strong>${key}:</strong> ${feature.properties[key]}<br>`;
                        }
                        if (popupContent) { layer.bindPopup(popupContent); }

                        if (feature.properties.color || feature.properties.fillColor || feature.properties.fillOpacity || feature.properties.weight) {
                            layer.options.customStyle = {
                                color: feature.properties.color, fillColor: feature.properties.fillColor,
                                fillOpacity: feature.properties.fillOpacity, weight: feature.properties.weight
                            };
                        }
                        layer.feature = feature;
                    }

                    layer.on('click', function(e) {
                         L.DomEvent.stopPropagation(e);
                         if (currentSelectedLayer) {
                              if (currentSelectedLayer instanceof L.Path && currentSelectedLayer.options.customStyle) {
                                   currentSelectedLayer.setStyle(currentSelectedLayer.options.customStyle);
                               } else {
                                    if (currentSelectedLayer instanceof L.Path) {
                                         currentSelectedLayer.setStyle({ weight: currentSelectedLayer instanceof L.Polyline ? 3 : 2 });
                                    }
                               }
                         }
                         currentSelectedLayer = this;
                         if (currentSelectedLayer instanceof L.Path) {
                             currentSelectedLayer.setStyle({ weight: 5, color: '#FFFF00' });
                             currentSelectedLayer.bringToFront();
                         }
                    });

                    drawnItems.addLayer(layer);
                    drawHistory.push(layer);
                }
            });

            geojsonLayer.addTo(map);
            if (geojsonLayer.getBounds().isValid()) {
                map.fitBounds(geojsonLayer.getBounds());
            }
        }

        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const geojson = JSON.parse(e.target.result);
                    loadGeoJSON(geojson);
                } catch (error) { alert("Fout bij het importeren: Ongeldig GeoJSON bestand"); }
            };
            reader.readAsText(file); e.target.value = '';
        });

        document.getElementById('shp-file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    shp(e.target.result).then(function(geojson) { loadGeoJSON(geojson); }).catch(function(error) { alert("Fout bij het importeren: Ongeldig Shapefile (ZIP-bestand vereist)"); });
                } catch (error) { alert("Fout bij het importeren: Ongeldig Shapefile"); }
            };
            reader.readAsArrayBuffer(file); e.target.value = '';
        });

        const handleDragOver = (e) => { e.preventDefault(); e.stopPropagation(); document.getElementById('map').classList.add('drag-over'); };
        const handleDragLeave = (e) => { e.preventDefault(); e.stopPropagation(); document.getElementById('map').classList.remove('drag-over'); };
        const handleDrop = (e) => {
            e.preventDefault(); e.stopPropagation(); document.getElementById('map').classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (!file) return;

            if (file.name.endsWith('.geojson') || file.name.endsWith('.json')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try { loadGeoJSON(JSON.parse(e.target.result)); } catch (error) { alert("Fout bij het importeren: Ongeldig GeoJSON bestand"); }
                }; reader.readAsText(file);
            } else if (file.name.endsWith('.zip')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try { shp(e.target.result).then(function(geojson) { loadGeoJSON(geojson); }).catch(function(error) { alert("Ongeldig Shapefile (ZIP)"); }); } catch (error) { alert("Ongeldig Shapefile"); }
                }; reader.readAsArrayBuffer(file);
            } else { alert("Alleen GeoJSON (.geojson, .json) of Shapefile (.zip) bestanden worden ondersteund"); }
        };

        map.getContainer().addEventListener('dragover', handleDragOver);
        map.getContainer().addEventListener('dragleave', handleDragLeave);
        map.getContainer().addEventListener('drop', handleDrop);

         map.on('click', function(e) {
             const clickedElement = e.originalEvent.target;
             const isLeafletLayer = clickedElement.classList.contains('leaflet-interactive') || clickedElement.closest('.leaflet-marker-icon');

             if (!isLeafletLayer && clickedElement === map.getContainer()) {
                 if (currentSelectedLayer) {
                      if (currentSelectedLayer instanceof L.Path && currentSelectedLayer.options.customStyle) {
                           currentSelectedLayer.setStyle(currentSelectedLayer.options.customStyle);
                       } else {
                            if (currentSelectedLayer instanceof L.Path) { currentSelectedLayer.setStyle({ weight: currentSelectedLayer instanceof L.Polyline ? 3 : 2 }); }
                       }
                 }
                 currentSelectedLayer = null;
             }
         });
    </script>
</body>
</html>
