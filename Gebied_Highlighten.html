<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gebied Highlighten | Den Helder</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      :root {
        --primary: #0079c1;
        --primary-hover: #005a87;
        --bg-panel: rgba(255, 255, 255, 0.85);
        --text-main: #1a1a1a;
        --text-muted: #4a4a4a;
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        --radius: 16px;
      }

      html, body, #viewDiv {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #f0f0f0;
      }

      .glass-panel {
        background: var(--bg-panel);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 20px;
        color: var(--text-main);
      }

      #mainContainer {
        position: absolute;
        top: 20px;
        left: 20px;
        width: 340px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        z-index: 10;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
      }

      .header i {
        color: var(--primary);
      }

      h1 {
        font-size: 18px;
        font-weight: 700;
        margin: 0;
        color: var(--text-main);
      }

      p {
        font-size: 14px;
        line-height: 1.6;
        color: var(--text-muted);
        margin: 0 0 16px 0;
      }

      .button-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      button {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background-color: var(--primary);
        color: white;
        border: none;
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        width: 100%;
      }

      button:hover {
        background-color: var(--primary-hover);
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(0, 121, 193, 0.3);
      }

      button.secondary {
        background-color: white;
        color: var(--text-main);
        border: 1px solid #e2e8f0;
      }

      button.secondary:hover {
        background-color: #f8fafc;
        border-color: #cbd5e1;
      }

      button.danger {
        background-color: #fee2e2;
        color: #ef4444;
      }

      button.danger:hover {
        background-color: #fecaca;
      }

      /* Preview container */
      .preview-container {
        margin-top: 16px;
        padding: 16px;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        display: none;
      }

      .preview-container.show {
        display: block;
      }

      .preview-label {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-main);
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .preview-label i {
        color: var(--primary);
      }

      .preview-image {
        width: 100%;
        height: 150px;
        background: #f0f0f0;
        border-radius: 8px;
        overflow: hidden;
        margin-bottom: 12px;
        border: 1px solid #e2e8f0;
      }

      .preview-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .action-buttons {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      .action-buttons button.small {
        flex: 1;
        padding: 10px;
        background: white;
        color: var(--text-main);
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        transition: all 0.2s ease;
      }

      .action-buttons button.small:hover {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
      }

      .action-buttons button.small i {
        width: 14px;
        height: 14px;
      }

      .link-hint {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 12px;
        display: flex;
        align-items: center;
        gap: 4px;
        background: rgba(0, 121, 193, 0.1);
        padding: 8px 12px;
        border-radius: 6px;
      }

      .esri-ui-top-left {
        left: 370px !important; 
        top: 20px !important;
      }

      .esri-sketch {
        box-shadow: var(--shadow) !important;
        border-radius: 12px !important;
        overflow: hidden;
      }

      #notification {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: #1e293b;
        color: white;
        padding: 12px 24px;
        border-radius: 30px;
        font-size: 14px;
        font-weight: 500;
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      }

      #notification.show {
        transform: translateX(-50%) translateY(0);
      }

      .animate-spin {
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @media (max-width: 480px) {
        #mainContainer {
          width: calc(100% - 40px);
        }
        .esri-ui-top-left {
          left: 20px !important;
          top: auto !important;
          bottom: 20px !important;
        }
        .action-buttons {
          flex-direction: column;
        }
      }
    </style>

    <link rel="stylesheet" href="https://js.arcgis.com/4.34/esri/themes/light/main.css" />
    <script src="https://js.arcgis.com/4.34/"></script>
  </head>
  <body>
    <div id="viewDiv"></div>

    <div id="mainContainer">
      <div class="glass-panel">
        <div class="header">
          <i data-lucide="map-pin"></i>
          <h1>Den Helder</h1>
        </div>
        <p>Teken een gebied om het te isoleren. Klik op 'Maak screenshot' voor een voorbeeld en downloadopties.</p>
        
        <div class="button-group">
          <button id="drawToggleBtn">
            <i data-lucide="pencil"></i>
            <span>Verberg Tekenhulp</span>
          </button>
          <button id="screenshotBtn" class="secondary">
            <i data-lucide="camera"></i>
            <span>Maak screenshot</span>
          </button>
          <button id="resetBtn" class="danger">
            <i data-lucide="trash-2"></i>
            <span>Alles resetten</span>
          </button>
        </div>

        <!-- Preview container met directe downloadopties -->
        <div id="previewContainer" class="preview-container">
          <div class="preview-label">
            <i data-lucide="image" size="16"></i>
            <span>Voorbeeld van screenshot</span>
          </div>
          
          <div class="preview-image" id="previewImage">
            <!-- Hier komt de img tag -->
          </div>
          
          <div class="action-buttons">
            <button id="downloadBtn" class="small">
              <i data-lucide="download" size="14"></i>
              Download
            </button>
            <button id="openNewTabBtn" class="small">
              <i data-lucide="external-link" size="14"></i>
              Open in tab
            </button>
            <button id="copyImageBtn" class="small">
              <i data-lucide="copy" size="14"></i>
              Kopieer
            </button>
          </div>
          
          <div class="link-hint">
            <i data-lucide="info" size="14"></i>
            <span>Klik op "Open in tab" voor de volledige afbeelding, of "Download" om direct op te slaan.</span>
          </div>
        </div>
      </div>
    </div>

    <div id="notification">
      <i id="notifIcon" data-lucide="check-circle-2" size="18"></i>
      <span id="notificationText">Klaar!</span>
    </div>

    <script type="module">
      const [Map, MapView, TileLayer, GraphicsLayer, GroupLayer, Sketch] =
        await $arcgis.import([
          "@arcgis/core/Map.js",
          "@arcgis/core/views/MapView.js",
          "@arcgis/core/layers/TileLayer.js",
          "@arcgis/core/layers/GraphicsLayer.js",
          "@arcgis/core/layers/GroupLayer.js",
          "@arcgis/core/widgets/Sketch.js",
        ]);

      lucide.createIcons();

      const worldImagery = new TileLayer({
        portalItem: { id: "10df2279f9684e4a9f6a7f08febac2a9" },
      });

      const graphicsLayer = new GraphicsLayer({
        blendMode: "destination-in",
        title: "Highlight masker",
      });

      const tileLayer = new TileLayer({
        portalItem: { id: "10df2279f9684e4a9f6a7f08febac2a9" },
      });
      
      tileLayer.when(() => {
        tileLayer.sublayers.forEach(l => l.popupEnabled = false);
      });

      const groupLayer = new GroupLayer({
        layers: [tileLayer, graphicsLayer],
        opacity: 0,
      });

      const map = new Map({
        layers: [worldImagery, groupLayer],
      });

      const view = new MapView({
        container: "viewDiv",
        map: map,
        zoom: 12,
        center: [4.75, 52.95],
        popup: null,
        ui: {
          components: ["attribution"]
        }
      });

      await view.when();

      const sketch = new Sketch({
        view: view,
        layer: graphicsLayer,
        creationMode: "single",
        availableCreateTools: ["polygon", "rectangle", "circle"],
        visibleElements: {
          selectionTools: false,
          settingsMenu: false,
        },
      });
      view.ui.add(sketch, "top-left");

      const drawToggleBtn = document.getElementById("drawToggleBtn");
      const screenshotBtn = document.getElementById("screenshotBtn");
      const resetBtn = document.getElementById("resetBtn");
      const previewContainer = document.getElementById("previewContainer");
      const previewImage = document.getElementById("previewImage");
      const downloadBtn = document.getElementById("downloadBtn");
      const openNewTabBtn = document.getElementById("openNewTabBtn");
      const copyImageBtn = document.getElementById("copyImageBtn");
      const notification = document.getElementById("notification");
      const notificationText = document.getElementById("notificationText");

      let drawingActive = true;
      let currentScreenshotDataUrl = null;

      function showNotification(message, duration = 4000) {
        notificationText.textContent = message;
        notification.classList.add("show");
        setTimeout(() => {
          notification.classList.remove("show");
        }, duration);
      }

      drawToggleBtn.addEventListener("click", () => {
        drawingActive = !drawingActive;
        sketch.visible = drawingActive;
        const icon = drawingActive ? 'pencil' : 'eye';
        const text = drawingActive ? 'Verberg Tekenhulp' : 'Toon Tekenhulp';
        drawToggleBtn.innerHTML = `<i data-lucide="${icon}"></i><span>${text}</span>`;
        lucide.createIcons();
      });

      // Maak screenshot functie
      screenshotBtn.addEventListener("click", async () => {
        screenshotBtn.disabled = true;
        const originalContent = screenshotBtn.innerHTML;
        screenshotBtn.innerHTML = `<i data-lucide="loader" class="animate-spin"></i><span>Bezig...</span>`;
        lucide.createIcons();

        try {
          await view.when();
          await new Promise(resolve => setTimeout(resolve, 100));

          // Neem screenshot met maximale kwaliteit
          const screenshot = await view.takeScreenshot({ 
            format: "png", 
            quality: 100,
            width: view.width,
            height: view.height
          });
          
          currentScreenshotDataUrl = screenshot.dataUrl;
          
          // Toon voorbeeld
          previewImage.innerHTML = `<img src="${screenshot.dataUrl}" alt="Screenshot voorbeeld">`;
          previewContainer.classList.add('show');
          
          // Update icons
          lucide.createIcons();
          
          showNotification("✅ Screenshot gemaakt! Kies een optie hieronder.");
        } catch (err) {
          showNotification("❌ Fout bij maken screenshot.");
          console.error(err);
        }

        screenshotBtn.disabled = false;
        screenshotBtn.innerHTML = originalContent;
        lucide.createIcons();
      });

      // Download knop - directe download
      downloadBtn.addEventListener("click", () => {
        if (!currentScreenshotDataUrl) {
          showNotification("⚠️ Maak eerst een screenshot");
          return;
        }
        
        const link = document.createElement("a");
        link.href = currentScreenshotDataUrl;
        link.download = `den-helder-${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.png`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        showNotification("📸 Download gestart!");
      });

      // Open in nieuw tabblad - dit werkt ALTIJD
      openNewTabBtn.addEventListener("click", () => {
        if (!currentScreenshotDataUrl) {
          showNotification("⚠️ Maak eerst een screenshot");
          return;
        }

        // Maak een complete HTML pagina met de afbeelding
        const htmlContent = `
          <!DOCTYPE html>
          <html>
          <head>
            <title>Den Helder Screenshot</title>
            <style>
              body { 
                margin: 0; 
                background: #1a1a1a; 
                display: flex; 
                flex-direction: column;
                align-items: center; 
                justify-content: center; 
                min-height: 100vh;
                font-family: 'Inter', sans-serif;
              }
              .container {
                background: white;
                padding: 20px;
                border-radius: 12px;
                box-shadow: 0 20px 40px rgba(0,0,0,0.3);
                max-width: 90%;
              }
              img { 
                max-width: 100%; 
                max-height: 80vh;
                display: block;
                border-radius: 8px;
              }
              .instructions {
                margin-top: 20px;
                color: #333;
                font-size: 14px;
                text-align: center;
              }
              .button {
                background: #0079c1;
                color: white;
                border: none;
                padding: 10px 20px;
                border-radius: 8px;
                cursor: pointer;
                font-size: 14px;
                margin-top: 10px;
              }
            </style>
          </head>
          <body>
            <div class="container">
              <img src="${currentScreenshotDataUrl}" alt="Den Helder Screenshot">
              <div class="instructions">
                <p>Rechtermuisknop op de afbeelding > "Afbeelding opslaan als..."</p>
                <button class="button" onclick="window.print()">🖨️ Print / PDF opslaan</button>
              </div>
            </div>
          </body>
          </html>
        `;

        // Open nieuw tabblad met de volledige HTML
        const newTab = window.open();
        if (newTab) {
          newTab.document.write(htmlContent);
          newTab.document.close();
          showNotification("✨ Screenshot geopend in nieuw tabblad!");
        } else {
          // Fallback als pop-up wordt geblokkeerd
          showNotification("⚠️ Sta pop-ups toe of gebruik Download");
        }
      });

      // Kopieer afbeelding naar klembord
      copyImageBtn.addEventListener("click", async () => {
        if (!currentScreenshotDataUrl) {
          showNotification("⚠️ Maak eerst een screenshot");
          return;
        }

        try {
          // Converteer data URL naar blob
          const response = await fetch(currentScreenshotDataUrl);
          const blob = await response.blob();
          
          // Kopieer naar klembord
          await navigator.clipboard.write([
            new ClipboardItem({
              [blob.type]: blob
            })
          ]);
          
          showNotification("📋 Afbeelding gekopieerd naar klembord!");
        } catch (err) {
          // Fallback: kopieer de link
          await navigator.clipboard.writeText(currentScreenshotDataUrl);
          showNotification("📋 Link gekopieerd (afbeelding kopiëren niet ondersteund)");
        }
      });

      resetBtn.addEventListener("click", () => {
        graphicsLayer.removeAll();
        worldImagery.effect = null;
        groupLayer.effect = null;
        groupLayer.opacity = 0;
        previewContainer.classList.remove('show');
        previewImage.innerHTML = '';
        currentScreenshotDataUrl = null;
        showNotification("🔄 Alles gereset");
      });

      function applyHighlightEffect(graphic) {
        graphic.symbol = {
          type: "simple-fill",
          color: "rgba(255, 255, 255, 1)",
          outline: null,
        };
        worldImagery.effect = "blur(8px) brightness(1.2) grayscale(0.8)";
        groupLayer.effect = "brightness(1.5) drop-shadow(0, 0, 12px, #000)";
        groupLayer.opacity = 1;
        view.goTo({ extent: graphic.geometry.extent.clone().expand(1.5) }, { duration: 800 });
      }

      sketch.on("create", event => {
        if (event.state === "complete") {
          applyHighlightEffect(event.graphic);
          previewContainer.classList.remove('show');
        }
      });

      sketch.on("delete", () => {
        worldImagery.effect = null;
        groupLayer.effect = null;
        groupLayer.opacity = 0;
        previewContainer.classList.remove('show');
      });

      sketch.on("update", event => {
        if (event.state === "complete" && event.graphics.length > 0) {
          applyHighlightEffect(event.graphics[0]);
          previewContainer.classList.remove('show');
        }
      });
    </script>
  </body>
</html>
