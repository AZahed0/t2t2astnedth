
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcGIS · popup bibliotheek</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;500;600&display=swap');
        body {
            background: #f2ede4;
            font-family: 'Inter', system-ui, sans-serif;
            color: #2b2a26;
            padding: 1.5rem;
        }
        .paper-sheet {
            background: #fcf9f4;
            border-radius: 4px 20px 4px 20px;
            border: 1px solid rgba(210, 200, 185, 0.4);
            transition: all 0.2s ease;
            box-shadow: 0 1px 4px rgba(44, 36, 22, 0.04);
        }
        .paper-sheet:hover {
            background: #faf6ef;
            border-color: rgba(180, 170, 155, 0.5);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(44, 36, 22, 0.06);
        }
        .code-block {
            background: #ede8df;
            border-radius: 2px 12px 2px 12px;
            padding: 0.8rem 1rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.7rem;
            line-height: 1.8;
            color: #3b3a36;
            border: 1px solid rgba(200, 190, 175, 0.25);
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .preview-box {
            background: #fcf9f4;
            border-radius: 2px 14px 2px 14px;
            border: 1px solid rgba(200, 190, 175, 0.2);
            padding: 0.8rem 1rem;
            min-height: 50px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
        }
        .badge-cat {
            background: #e3ddd2;
            color: #4b4a46;
            font-size: 0.55rem;
            padding: 0.1rem 0.8rem;
            border-radius: 2px 14px 2px 14px;
            border: 1px solid rgba(200, 190, 175, 0.2);
        }
        .tab-btn {
            background: transparent;
            padding: 0.3rem 1.2rem;
            font-size: 0.7rem;
            font-weight: 400;
            color: #6b655a;
            border: 1px solid transparent;
            border-radius: 2px 18px 2px 18px;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .tab-btn.active {
            background: #ede8df;
            color: #2b2a26;
            border-color: rgba(180, 170, 155, 0.3);
        }
        .tab-btn:not(.active):hover {
            background: rgba(235, 225, 215, 0.4);
        }
        .copy-btn {
            background: transparent;
            border: 1px solid rgba(180, 170, 155, 0.25);
            padding: 0.1rem 0.8rem;
            border-radius: 2px 16px 2px 16px;
            font-size: 0.6rem;
            color: #6b655a;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .copy-btn:hover {
            background: #ede8df;
            border-color: #b8a99a;
            color: #2b2a26;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #e3ddd2; border-radius: 20px; }
        ::-webkit-scrollbar-thumb { background: #c2b5a5; border-radius: 20px; }
        .stamp {
            border: 1px solid rgba(180, 170, 155, 0.2);
            padding: 0.05rem 0.6rem;
            border-radius: 2px 12px 2px 12px;
            font-size: 0.55rem;
            color: #6b655a;
            background: rgba(235, 225, 215, 0.3);
        }
        /* voorbeeld-specifieke stijlen */
        .traffic-light {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 6px 10px;
            background: #2b2a26;
            border-radius: 12px;
        }
        .traffic-light .light {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #555;
        }
        .traffic-light .light.red { background: #E53935; }
        .traffic-light .light.yellow { background: #FDD835; }
        .traffic-light .light.green { background: #43A047; }
        .battery {
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .battery .body {
            width: 100px;
            height: 30px;
            border: 2px solid #2b2a26;
            border-radius: 4px;
            position: relative;
            background: #eee;
        }
        .battery .body .fill {
            height: 100%;
            background: #4CAF50;
            border-radius: 2px;
        }
        .battery .tip {
            width: 8px;
            height: 16px;
            background: #2b2a26;
            border-radius: 0 4px 4px 0;
        }
        .thermometer {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .thermometer .tube {
            width: 24px;
            height: 120px;
            background: #ddd;
            border-radius: 12px 12px 6px 6px;
            position: relative;
            overflow: hidden;
        }
        .thermometer .tube .fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: #E53935;
            border-radius: 0 0 6px 6px;
            height: 65%;
        }
        .thermometer .bulb {
            width: 30px;
            height: 30px;
            background: #E53935;
            border-radius: 50%;
            margin-top: -4px;
            border: 2px solid #ddd;
        }
    </style>
</head>

        // ----- render -----
        const grid = document.getElementById('examples-grid');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toast-msg');

        function renderExamples(filter = 'all') {
            grid.innerHTML = '';
            const filtered = examples.filter(e => filter === 'all' || e.cat === filter);
            if (!filtered.length) {
                grid.innerHTML = `<div class="col-span-full text-center text-[#6b655a] italic p-8 paper-sheet p-6">✦ geen componenten in deze categorie</div>`;
                return;
            }
            filtered.forEach(ex => {
                const card = document.createElement('div');
                card.className = 'paper-sheet p-4 flex flex-col relative';
                card.style.borderRadius = '4px 24px 4px 24px';
                card.innerHTML = `
                    <div class="flex items-start justify-between gap-2">
                        <span class="badge-cat">${ex.cat}</span>
                        <span class="text-[10px] text-[#6b655a]">#${ex.id}</span>
                    </div>
                    <h4 class="font-medium text-sm mt-1 text-[#2b2a26]">${ex.title}</h4>
                    <div class="preview-box my-2">${ex.preview || '—'}</div>
                    <div class="code-block text-xs mt-1 flex-1">${ex.code}</div>
                    <button class="copy-btn mt-2 self-end">📋 kopieer HTML</button>
                `;
                grid.appendChild(card);
            });

            document.querySelectorAll('.copy-btn').forEach((btn) => {
                btn.addEventListener('click', (e) => {
                    const card = e.target.closest('.paper-sheet');
                    const codeBlock = card.querySelector('.code-block');
                    const code = codeBlock.textContent.trim();
                    navigator.clipboard?.writeText?.(code)?.then(() => showToast('✦ HTML-code gekopieerd')) 
                    || (() => { const ta = document.createElement('textarea'); ta.value = code; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); showToast('✦ HTML-code gekopieerd'); })();
                });
            });
        }

        function showToast(msg) {
            toastMsg.textContent = msg;
            toast.classList.remove('translate-y-16', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            clearTimeout(toast._hide);
            toast._hide = setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-16', 'opacity-0');
            }, 2000);
        }

        // tabs
        document.querySelectorAll('.tab-btn').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                renderExamples(tab.dataset.cat);
            });
        });

        renderExamples('all');
