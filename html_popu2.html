            color: #5f5a4c;

            padding: 0.3rem 1.4rem;

            color: #5a5547;

            height: 8px;
            background: #8f9e8b;
            border-radius: 50%;

            flex-wrap: wrap;

        }

            font-size: 0.8rem;
            font-weight: 380;
            color: #5f5a4e;

            letter-spacing: 0.2px;
            white-space: nowrap;

            color: #2e2c26;

        }

            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 1.3rem;
        }

            background: #fdfbf6;

            const grid = document.getElementById('examplesGrid');

            let toastTimer;

            function showToast(text) {
                toastMsg.textContent = text;
                toast.classList.add('show');
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
            }

            function renderCards(filter = 'all') {
                const filtered = allComponents.filter(c => filter === 'all' || c.cat === filter);
                grid.innerHTML = '';
                if (!filtered.length) {
                    grid.innerHTML =
                        '<div style="grid-column:1/-1;text-align:center;padding:2rem;color:#6b6557;">✦ geen componenten in deze categorie</div>';
                    return;
                }
                filtered.forEach(c => {
                    const card = document.createElement('div');
                    card.className = 'component-card';
                    card.innerHTML = `
                <div class="card-meta">
                  <span class="category-badge">${c.cat}</span>
                  <span class="component-id">#${c.id}</span>
                </div>
                <div class="component-title">${c.title}</div>
                <div class="preview-window">${c.preview || '—'}</div>
                <div class="code-snippet">${c.code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
                <button class="copy-button">📋 kopieer HTML</button>
              `;
                    grid.appendChild(card);
                });

                // event listeners op knoppen
                document.querySelectorAll('.copy-button').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const cardEl = e.target.closest('.component-card');
                        const rawCode = cardEl.querySelector('.code-snippet').textContent;
                        // unescape HTML entities terug naar echte code
                        const txt = document.createElement('textarea');
                        txt.innerHTML = rawCode;
                        const decoded = txt.value;
                        navigator.clipboard?.writeText?.(decoded).then(() => showToast(
                            '✦ HTML-code gekopieerd')).catch(() => {
                            const ta = document.createElement('textarea');
                            ta.value = decoded;
                            document.body.appendChild(ta);
                            ta.select();
                            document.execCommand('copy');
                            ta.remove();
                            showToast('✦ HTML-code gekopieerd');
                        });
                    });
                });
            }

            // tab events
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {

                        'active'));
                    btn.classList.add('active');
                    renderCards(btn.dataset.cat);
                });
            });

            renderCards('all');
