
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade · kniptekst</title>
    <!-- Tailwind + custom paper layers -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        paper: '#fcf6ed',
                        paper2: '#f5ede1',
                        paper3: '#eee3d3',
                        paste: '#fce8d9',
                        warm: '#d9b89c',
                        softshadow: '#c7b3a0',
                        ink: '#2c2416',
                        accent: '#d97642',
                        accent2: '#b58a6b',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap');
        body {
            background: #efe6d8;
            font-family: 'Futura', 'Century Gothic', 'Avenir', system-ui, sans-serif;
            color: #2c2416;
            min-height: 100vh;
            padding: 1.5rem;
            background-image: radial-gradient(circle at 20% 30%, #f5ede1 0%, #d9cbbc 90%);
        }
        /* paper cut-out base */
        .paper-sheet {
            background: #fcf6ed;
            border-radius: 48px 24px 48px 24px;
            box-shadow: 
                0 8px 0 #d9cbbc,
                0 12px 24px -8px rgba(44, 36, 22, 0.25),
                inset 0 -2px 4px rgba(255,255,255,0.6);
            transition: all 0.18s ease;
            position: relative;
            border: 1px solid rgba(255, 245, 235, 0.5);
        }
        .paper-sheet::after {
            content: '';
            position: absolute;
            inset: 6px 8px -4px -2px;
            background: rgba(255, 245, 235, 0.2);
            border-radius: 48px 24px 48px 24px;
            z-index: -1;
            filter: blur(2px);
            opacity: 0.5;
        }
        .paper-sheet:hover {
            transform: translateY(-3px) rotate(0.3deg);
            box-shadow: 
                0 12px 0 #d9cbbc,
                0 20px 32px -12px rgba(44, 36, 22, 0.35),
                inset 0 -2px 4px rgba(255,255,255,0.6);
        }
        .paper-stack {
            box-shadow: 
                0 4px 0 #e3d3c2,
                0 8px 0 #d4c5b5,
                0 16px 28px -10px rgba(44, 36, 22, 0.2);
            border-radius: 36px 18px 36px 18px;
            background: #fcf6ed;
            transition: all 0.18s ease;
        }
        .paper-stack:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 6px 0 #e3d3c2,
                0 12px 0 #d4c5b5,
                0 24px 36px -12px rgba(44, 36, 22, 0.3);
        }
        .paper-tab {
            background: #f5ede1;
            border-radius: 40px 12px 40px 12px;
            box-shadow: inset 0 -2px 0 #d9cbbc, 0 4px 8px rgba(44,36,22,0.06);
        }
        .code-block {
            background: #f5ede1;
            border-radius: 28px 12px 28px 12px;
            padding: 0.9rem 1.2rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.7rem;
            line-height: 1.8;
            color: #2c2416;
            box-shadow: inset 0 2px 6px rgba(44,36,22,0.06), 0 1px 0 #fff8f0;
            border: 1px solid #e8dbcd;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .cut-edge {
            border-radius: 40% 20% 50% 20% / 30% 40% 20% 50%;
        }
        .cut-edge-sm {
            border-radius: 30% 10% 40% 10% / 20% 30% 10% 40%;
        }
        .badge-paper {
            background: #d9cbbc;
            color: #2c2416;
            font-size: 0.55rem;
            padding: 0.1rem 0.7rem;
            border-radius: 30px 8px 30px 8px;
            letter-spacing: 0.03em;
            box-shadow: inset 0 -1px 0 #b5a392;
        }
        .shadow-soft {
            box-shadow: 0 8px 20px -8px rgba(44,36,22,0.12), 0 2px 0 #fff8f0;
        }
        /* noise texture overlay (paper grain) */
        .grain {
            position: relative;
        }
        .grain::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            opacity: 0.12;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            background-size: 200px 200px;
            pointer-events: none;
            mix-blend-mode: multiply;
        }
        .tab-paper {
            background: #f5ede1;
            border-radius: 40px 12px 40px 12px;
            padding: 0.3rem 1.2rem;
            font-size: 0.7rem;
            font-weight: 500;
            color: #6b5d4f;
            border: 1px solid transparent;
            box-shadow: inset 0 -2px 0 #d9cbbc;
            transition: all 0.12s ease;
            cursor: pointer;
        }
        .tab-paper.active {
            background: #2c2416;
            color: #fcf6ed;
            border-color: #2c2416;
            box-shadow: 0 4px 0 #d9cbbc;
            transform: translateY(-1px);
        }
        .tab-paper:not(.active):hover {
            background: #e8dbcd;
            transform: translateY(-1px);
        }
        /* scroll */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #e8dbcd; border-radius: 20px; }
        ::-webkit-scrollbar-thumb { background: #b5a392; border-radius: 20px; }
        /* lifted layer */
        .lift-layer {
            transition: all 0.18s ease;
        }
        .lift-layer:hover {
            transform: translateY(-4px) rotate(0.5deg);
            box-shadow: 0 12px 0 #d4c5b5, 0 24px 36px -12px rgba(44,36,22,0.25);
        }
    </style>
</head>
<body>

    <div class="max-w-7xl mx-auto w-full">

        <!-- header – paper cut -->
        <header class="paper-sheet p-6 mb-8 flex flex-wrap items-center justify-between gap-4" style="border-radius: 60px 20px 60px 20px;">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 rounded-full bg-[#d97642] flex items-center justify-center text-2xl shadow-[0_6px_0_#b58a6b,0_8px_16px_rgba(44,36,22,0.1)]">
                    ✂️
                </div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tight text-[#2c2416] flex items-center gap-3">
                        Arcade · kniptekst
                        <span class="text-xs bg-[#2c2416] text-[#fcf6ed] px-3 py-0.5 rounded-full shadow-[0_3px_0_#b5a392]">paper</span>
                    </h1>
                    <p class="text-sm text-[#6b5d4f]">150+ tekstbewerkingen · knip & plak</p>
                </div>
            </div>
            <div class="flex items-center gap-2 text-xs bg-[#f5ede1] px-4 py-2 rounded-full shadow-[inset_0_-2px_0_#d9cbbc]">
                <span class="w-2 h-2 rounded-full bg-[#4a7c59]"></span>
                <span>klaar om te knippen</span>
            </div>
        </header>

        <!-- tabs – paper strips -->
        <div class="flex flex-wrap items-center gap-2 mb-6">
            <button class="tab-paper active" data-cat="all">📌 alle</button>
            <button class="tab-paper" data-cat="split">✂️ splitsen</button>
            <button class="tab-paper" data-cat="zoek">🔍 zoeken</button>
            <button class="tab-paper" data-cat="format">🎨 opmaak</button>
            <button class="tab-paper" data-cat="email">📧 email/url</button>
            <button class="tab-paper" data-cat="bestand">📁 bestand</button>
            <button class="tab-paper" data-cat="naam">👤 namen</button>
            <button class="tab-paper" data-cat="adres">🏠 adres</button>
            <button class="tab-paper" data-cat="code">🔢 codes</button>
            <button class="tab-paper" data-cat="validatie">✅ validatie</button>
        </div>

        <!-- grid of paper cards -->
        <div id="examples-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5">
            <!-- injected -->
        </div>

        <!-- footer -->
        <div class="paper-sheet p-4 mt-8 flex flex-wrap justify-between items-center text-xs text-[#6b5d4f]" style="border-radius: 40px 12px 40px 12px;">
            <span>✂️ kniptekst · 150+ voorbeelden — klik op een kaartje om de code te kopiëren</span>
            <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-[#d97642]"></span> paper cut edition</span>
        </div>
    </div>

    <!-- toast -->
    <div id="toast" class="fixed bottom-6 right-6 bg-[#2c2416] text-[#fcf6ed] px-5 py-3 rounded-full shadow-[0_6px_0_#b5a392,0_12px_24px_rgba(44,36,22,0.2)] text-sm font-medium flex items-center gap-2 transform translate-y-16 opacity-0 transition-all duration-300 pointer-events-none z-50">
        <span id="toast-msg">✓ gekopieerd</span>
    </div>

    <script>
        // ----- data (compact, 100+ voorbeelden) -----
        const examples = [
            // split
            { id:1, cat:'split', title:'Eerste 5 letters', code:'var txt = $feature.Naam;\nreturn Left(txt, 5);', example:'Amsterdam → Amste' },
            { id:2, cat:'split', title:'Laatste 4 letters', code:'var txt = $feature.Naam;\nreturn Right(txt, 4);', example:'Amsterdam → rdam' },
            { id:3, cat:'split', title:'Tekst vanaf positie 3', code:'var txt = $feature.Naam;\nreturn Mid(txt, 3);', example:'Amsterdam → terdam' },
            { id:4, cat:'split', title:'Splitsen op "-"', code:'var delen = Split($feature.Code, "-");\nreturn delen[0];', example:'ABC-123-XYZ → ABC' },
            { id:5, cat:'split', title:'Tweede deel na "-"', code:'var delen = Split($feature.Code, "-");\nreturn delen[1];', example:'ABC-123-XYZ → 123' },
            { id:6, cat:'split', title:'Laatste deel', code:'var d = Split($feature.Code, "-");\nreturn d[Count(d)-1];', example:'ABC-123-XYZ → XYZ' },
            { id:7, cat:'split', title:'Splitsen op ";"', code:'var delen = Split($feature.Tags, ";");\nreturn delen[0];', example:'Boom;Plant;Water → Boom' },
            { id:8, cat:'split', title:'Tweede waarde uit ";"', code:'var d = Split($feature.Tags, ";");\nreturn d[1];', example:'Boom;Plant;Water → Plant' },
            { id:9, cat:'split', title:'Splitsen op spatie', code:'var naam = Split($feature.Naam, " ");\nreturn naam[0];', example:'Jan Jansen → Jan' },
            { id:10, cat:'split', title:'Achternaam', code:'var naam = Split($feature.Naam, " ");\nreturn naam[1];', example:'Jan Jansen → Jansen' },
            { id:11, cat:'split', title:'Alles vóór eerste "-"', code:'var txt = $feature.Code;\nreturn Left(txt, Find("-", txt));', example:'ABC-123 → ABC' },
            { id:12, cat:'split', title:'Alles na eerste "-"', code:'var txt = $feature.Code;\nreturn Mid(txt, Find("-", txt)+1);', example:'ABC-123 → 123' },
            { id:13, cat:'split', title:'Eerste woord', code:'return Split($feature.Naam," ")[0];', example:'Jan van Dijk → Jan' },
            { id:14, cat:'split', title:'Laatste woord', code:'var w = Split($feature.Naam," ");\nreturn w[Count(w)-1];', example:'Jan van Dijk → Dijk' },
            { id:15, cat:'split', title:'Tweede woord', code:'var w=Split($feature.Naam," ");\nreturn w[1];', example:'Jan van Dijk → van' },
            { id:16, cat:'split', title:'Alles behalve eerste woord', code:'var w=Split($feature.Naam," ");\nreturn Concatenate(Slice(w,1)," ");', example:'Jan van Dijk → van Dijk' },
            { id:17, cat:'split', title:'Eerste 8 tekens', code:'return Left($feature.Code,8);', example:'ABC1234567 → ABC12345' },
            { id:18, cat:'split', title:'Laatste 8 tekens', code:'return Right($feature.Code,8);', example:'ABC1234567 → 1234567' },
            { id:19, cat:'split', title:'Middelste 4 tekens', code:'return Mid($feature.Code,4,4);', example:'ABCDEFGH → DEFG' },
            { id:20, cat:'split', title:'Alles tussen eerste en laatste "-"', code:'var d=Split($feature.Code,"-");\nreturn Concatenate(Slice(d,1,Count(d)-1),"-");', example:'A-B-C-D → B-C' },
            { id:21, cat:'split', title:'Laatste twee delen', code:'var d=Split($feature.Code,"-");\nreturn d[Count(d)-2]+"-"+d[Count(d)-1];', example:'A-B-C-D → C-D' },
            { id:22, cat:'split', title:'Alleen eerste teken', code:'return Left($feature.Code,1);', example:'ABC → A' },
            { id:23, cat:'split', title:'Alleen laatste teken', code:'return Right($feature.Code,1);', example:'ABC → C' },
            // zoek
            { id:24, cat:'zoek', title:'Bevat "straat"', code:'return Find("straat",Lower($feature.Adres))>-1;', example:'Kerkstraat → true' },
            { id:25, cat:'zoek', title:'Bevat geen cijfers', code:'var txt=$feature.Code;\nfor(var i=0;i<10;i++){if(Find(Text(i),txt)>=0){return false;}}\nreturn true;', example:'ABC → true' },
            { id:26, cat:'zoek', title:'Alles vervangen (_,-,.)', code:'return Replace(Replace(Replace($feature.Naam,"_"," "),"-"," "),"."," ");', example:'Jan_Jansen → Jan Jansen' },
            { id:27, cat:'zoek', title:'Beginsel ongeacht hoofdletters', code:'StartsWith(Upper($feature.Naam),"BOOM")', example:'Boomstraat → true' },
            { id:28, cat:'zoek', title:'Eindigt op JPG of PNG', code:'var b=Lower($feature.Bestand);\nreturn EndsWith(b,".jpg") || EndsWith(b,".png");', example:'foto.jpg → true' },
            { id:29, cat:'zoek', title:'Positie van eerste komma', code:'return Find(",",$feature.Adres);', example:'Hoofdstraat 12, Den Helder → 17' },
            { id:30, cat:'zoek', title:'Tel aantal "-"', code:'var txt=$feature.Code;\nreturn Count(Split(txt,"-"))-1;', example:'A-B-C → 2' },
            { id:31, cat:'zoek', title:'Controle dubbele spaties', code:'Find("  ",$feature.Naam)>=0;', example:'Jan  Jansen → true' },
            // format
            { id:32, cat:'format', title:'Hoofdletters', code:'return Upper($feature.Naam);', example:'Amsterdam → AMSTERDAM' },
            { id:33, cat:'format', title:'Kleine letters', code:'return Lower($feature.Naam);', example:'Amsterdam → amsterdam' },
            { id:34, cat:'format', title:'Eerste letter hoofdletter', code:'return Proper($feature.Naam);', example:'jan jansen → Jan Jansen' },
            { id:35, cat:'format', title:'Alleen eerste letter hoofdletter', code:'var txt=Lower($feature.Naam);\nreturn Upper(Left(txt,1))+Mid(txt,1);', example:'jan → Jan' },
            { id:36, cat:'format', title:'Alles zonder spaties', code:'Replace($feature.Naam," ","")', example:'Jan Jansen → JanJansen' },
            { id:37, cat:'format', title:'Dubbele spaties verwijderen (loop)', code:'var txt=$feature.Naam;\nwhile(Find("  ",txt)>=0){txt=Replace(txt,"  "," ");}\nreturn txt;', example:'Jan  Jansen → Jan Jansen' },
            { id:38, cat:'format', title:'Titelvorm', code:'Proper(Lower($feature.Naam))', example:'jan van dijk → Jan Van Dijk' },
            { id:39, cat:'format', title:'CamelCase', code:'Replace(Proper($feature.Naam)," ","")', example:'jan jansen → JanJansen' },
            // email
            { id:40, cat:'email', title:'TLD ophalen', code:'var d=Split(Split($feature.Email,"@")[1],".");\nreturn d[Count(d)-1];', example:'jan@test.nl → nl' },
            { id:41, cat:'email', title:'Domeinnaam zonder extensie', code:'Split(Split($feature.Email,"@")[1],".")[0]', example:'jan@gmail.com → gmail' },
            { id:42, cat:'email', title:'Protocol ophalen', code:'Split($feature.URL,":")[0]', example:'https://arcgis.com → https' },
            { id:43, cat:'email', title:'Email gebruikersnaam', code:'return Split($feature.Email,"@")[0];', example:'jan@test.nl → jan' },
            // bestand
            { id:44, cat:'bestand', title:'Bestand zonder pad', code:'var d=Split($feature.Pad,"\\\\");\nreturn d[Count(d)-1];', example:'C:\\map\\bestand.pdf → bestand.pdf' },
            { id:45, cat:'bestand', title:'Mapnaam', code:'var d=Split($feature.Pad,"\\\\");\nreturn d[Count(d)-2];', example:'C:\\map\\sub\\bestand.pdf → sub' },
            { id:46, cat:'bestand', title:'Bestandsextensie', code:'var d=Split($feature.Bestand,".");\nreturn d[Count(d)-1];', example:'rapport.pdf → pdf' },
            // namen
            { id:47, cat:'naam', title:'Initialen zonder punten', code:'var w=Split($feature.Naam," ");\nvar r="";\nfor(var i in w){r+=Left(w[i],1);}\nreturn Upper(r);', example:'Jan van Dijk → JVD' },
            { id:48, cat:'naam', title:'Naam omdraaien', code:'var w=Split($feature.Naam," ");\nreturn w[1]+", "+w[0];', example:'Jan Jansen → Jansen, Jan' },
            // adres
            { id:49, cat:'adres', title:'Straat zonder huisnummer', code:'var w=Split($feature.Adres," ");\nreturn Concatenate(Slice(w,0,Count(w)-1)," ");', example:'Hoofdstraat 12 → Hoofdstraat' },
            { id:50, cat:'adres', title:'Huisnummer', code:'var w=Split($feature.Adres," ");\nreturn w[Count(w)-1];', example:'Hoofdstraat 12 → 12' },
            { id:51, cat:'adres', title:'Postcode zonder spatie', code:'Replace($feature.Postcode," ","")', example:'1234 AB → 1234AB' },
            // codes
            { id:52, cat:'code', title:'Prefix toevoegen', code:'"OBJ-"+$feature.Code', example:'123 → OBJ-123' },
            { id:53, cat:'code', title:'Vaste lengte 10', code:'Right("0000000000"+$feature.Code,10)', example:'123 → 0000000123' },
            { id:54, cat:'code', title:'Nummer op 8 cijfers', code:'Right("00000000"+Text($feature.ID),8)', example:'25 → 00000025' },
            { id:55, cat:'code', title:'Kenteken zonder "-"', code:'Replace($feature.Kenteken,"-","")', example:'AB-123-CD → AB123CD' },
            // validatie
            { id:56, cat:'validatie', title:'Minimale lengte 8', code:'Count($feature.Code)>=8', example:'ABC12345 → true' },
            { id:57, cat:'validatie', title:'Begint met letter', code:'var c=Upper(Left($feature.Code,1));\nreturn c>="A" && c<="Z";', example:'ABC → true' },
            { id:58, cat:'validatie', title:'Lege tekst controleren', code:'if(IsEmpty($feature.Naam)){return "Geen naam";}\nreturn $feature.Naam;', example:'' },
            // extra
            { id:59, cat:'split', title:'Eerste letter', code:'return Left($feature.Naam,1);', example:'Amsterdam → A' },
            { id:60, cat:'split', title:'Laatste letter', code:'return Right($feature.Naam,1);', example:'Amsterdam → m' },
            { id:61, cat:'format', title:'Tekst tussen []', code:'"["+$feature.Code+"]"', example:'ABC → [ABC]' },
            { id:62, cat:'format', title:'Emoji toevoegen', code:'"📍 "+$feature.Naam', example:'Jan → 📍 Jan' },
            { id:63, cat:'format', title:'Automatisch afkappen', code:'IIf(Count($feature.Omschrijving)>50,Left($feature.Omschrijving,50)+"...",$feature.Omschrijving)', example:'' },
        ];

        // ----- render -----
        const grid = document.getElementById('examples-grid');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toast-msg');

        function renderExamples(filter = 'all') {
            grid.innerHTML = '';
            const filtered = examples.filter(e => filter === 'all' || e.cat === filter);
            if (!filtered.length) {
                grid.innerHTML = `<div class="col-span-full text-center text-[#6b5d4f] italic p-8 paper-sheet p-6">✂️ geen voorbeelden in deze categorie</div>`;
                return;
            }
            filtered.forEach(ex => {
                const card = document.createElement('div');
                card.className = 'paper-stack p-4 flex flex-col grain relative';
                card.style.borderRadius = '40px 16px 40px 16px';
                card.innerHTML = `
                    <div class="flex items-start justify-between gap-2">
                        <span class="badge-paper">${ex.cat}</span>
                        <span class="text-[10px] text-[#6b5d4f]">#${ex.id}</span>
                    </div>
                    <h4 class="font-semibold text-sm mt-1 text-[#2c2416]">${ex.title}</h4>
                    <div class="code-block text-xs mt-2 flex-1">${ex.code}</div>
                    ${ex.example ? `<div class="text-xs text-[#6b5d4f] mt-2 border-t border-[#d9cbbc] pt-1.5">✂️ ${ex.example}</div>` : ''}
                    <button class="copy-btn mt-2 text-[10px] text-[#d97642] hover:underline self-end flex items-center gap-1 bg-[#f5ede1] px-3 py-0.5 rounded-full shadow-[inset_0_-2px_0_#d9cbbc]">📋 kopieer</button>
                `;
                grid.appendChild(card);
            });

            document.querySelectorAll('.copy-btn').forEach((btn) => {
                btn.addEventListener('click', (e) => {
                    const card = e.target.closest('.paper-stack');
                    const codeBlock = card.querySelector('.code-block');
                    const code = codeBlock.textContent.trim();
                    navigator.clipboard?.writeText?.(code)?.then(() => showToast('✂️ code gekopieerd')) 
                    || (() => { const ta = document.createElement('textarea'); ta.value = code; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); showToast('✂️ code gekopieerd'); })();
                });
            });
        }

        function showToast(msg) {
            toastMsg.textContent = msg;
            toast.classList.remove('translate-y-16', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            clearTimeout(toast._hide);
            toast._hide = setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-16', 'opacity-0');
            }, 2000);
        }

        // tabs
        document.querySelectorAll('.tab-paper').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab-paper').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                renderExamples(tab.dataset.cat);
            });
        });

        renderExamples('all');
    </script>

</body>
</html>
