<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro CSV naar Excel Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.4s ease forwards;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-extrabold text-slate-900 flex items-center justify-center gap-3">
                <i data-lucide="file-spreadsheet" class="text-emerald-600 w-10 h-10"></i>
                Pro CSV naar Excel
            </h1>
            <p class="text-slate-600 mt-2">Converteer, preview en kies precies welke data je nodig hebt.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- Settings & Selection -->
            <div class="lg:col-span-1 space-y-6">
                <div class="glass-card p-6 rounded-2xl shadow-xl border border-slate-200">
                    <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                        <i data-lucide="settings" class="w-5 h-5"></i> Instellingen
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Scheidingsteken</label>
                            <select id="delimiter" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
                                <option value="auto">Automatisch detecteren</option>
                                <option value=";">Puntkomma (;)</option>
                                <option value=",">Komma (,)</option>
                                <option value="\t">Tab</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Encoding</label>
                            <select id="encoding" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
                                <option value="UTF-8">UTF-8 (Emoji support)</option>
                                <option value="windows-1252">Windows-1252 (Westers)</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-8">
                        <div id="dropZone" class="relative border-2 border-dashed border-slate-300 rounded-xl p-8 text-center hover:border-emerald-500 hover:bg-emerald-50 transition-all cursor-pointer group">
                            <input type="file" id="csvFile" accept=".csv" class="absolute inset-0 opacity-0 cursor-pointer">
                            <i data-lucide="upload-cloud" class="w-12 h-12 mx-auto text-slate-400 group-hover:text-emerald-500 transition-colors mb-3"></i>
                            <p class="text-sm font-medium text-slate-600 group-hover:text-emerald-700" id="fileNameDisplay">Klik of sleep bestand</p>
                        </div>
                    </div>

                    <!-- Column Selector -->
                    <div id="columnSelectorSection" class="mt-8 hidden animate-slide-up">
                        <h3 class="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2">
                            <i data-lucide="list-checks" class="w-4 h-4"></i> Selecteer Kolommen
                        </h3>
                        <div id="columnCheckboxes" class="space-y-2 max-h-60 overflow-y-auto custom-scrollbar p-1">
                            <!-- Checkboxes dynamic -->
                        </div>
                    </div>

                    <div class="mt-6 space-y-3">
                        <button id="convertBtn" disabled class="w-full bg-emerald-600 hover:bg-emerald-700 disabled:bg-slate-300 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-emerald-200 transition-all flex items-center justify-center gap-2">
                            <i data-lucide="download" class="w-5 h-5"></i>
                            Download .XLSX
                        </button>
                    </div>
                </div>

                <div id="statusMessage" class="hidden p-4 rounded-xl text-sm font-medium border animate-slide-up"></div>
            </div>

            <!-- Data Preview Area -->
            <div class="lg:col-span-3">
                <div class="glass-card rounded-2xl shadow-xl border border-slate-200 flex flex-col h-full min-h-[600px]">
                    <div class="p-6 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4">
                        <h2 class="text-lg font-semibold flex items-center gap-2">
                            <i data-lucide="table" class="w-5 h-5 text-emerald-600"></i> Data Preview
                            <span id="rowCount" class="text-xs bg-slate-100 px-2 py-1 rounded-full text-slate-500 font-normal">0 rijen</span>
                        </h2>
                        <div class="relative w-full md:w-80">
                            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                            <input type="text" id="searchInput" placeholder="Zoek in alle velden..." class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
                        </div>
                    </div>

                    <div class="flex-grow overflow-hidden relative">
                        <div id="tableWrapper" class="absolute inset-0 overflow-auto custom-scrollbar">
                            <table class="w-full text-left text-sm border-collapse" id="dataTable">
                                <thead class="sticky top-0 bg-slate-50 shadow-sm z-10">
                                    <tr id="tableHeader">
                                        <th class="p-4 text-slate-400 italic font-normal">Upload een CSV om de preview te starten...</th>
                                    </tr>
                                </thead>
                                <tbody id="tableBody" class="divide-y divide-slate-100">
                                    <!-- Rows go here -->
                                </tbody>
                            </table>
                        </div>

                        <!-- Initial Placeholder -->
                        <div id="emptyState" class="flex flex-col items-center justify-center h-full p-12 text-center text-slate-400">
                            <div class="bg-slate-50 p-6 rounded-full mb-4">
                                <i data-lucide="file-text" class="w-12 h-12 opacity-20"></i>
                            </div>
                            <p class="font-medium">Wachtend op bestand...</p>
                            <p class="text-xs mt-1">Emoji's en speciale tekens worden ondersteund.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let currentData = [];
        let filteredData = [];
        let headers = [];
        let selectedColumnIndices = [];

        const csvFileInput = document.getElementById('csvFile');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const convertBtn = document.getElementById('convertBtn');
        const dropZone = document.getElementById('dropZone');
        const tableBody = document.getElementById('tableBody');
        const tableHeader = document.getElementById('tableHeader');
        const emptyState = document.getElementById('emptyState');
        const rowCount = document.getElementById('rowCount');
        const searchInput = document.getElementById('searchInput');
        const statusMessage = document.getElementById('statusMessage');
        const columnSelectorSection = document.getElementById('columnSelectorSection');
        const columnCheckboxes = document.getElementById('columnCheckboxes');

        csvFileInput.addEventListener('change', e => handleFile(e.target.files[0]));
        
        dropZone.addEventListener('dragover', e => {
            e.preventDefault();
            dropZone.classList.add('bg-emerald-50', 'border-emerald-500');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('bg-emerald-50', 'border-emerald-500');
        });

        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('bg-emerald-50', 'border-emerald-500');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });

        searchInput.addEventListener('input', e => filterData(e.target.value));
        convertBtn.addEventListener('click', () => exportToExcel());

        async function handleFile(file) {
            if (!file) return;
            fileNameDisplay.textContent = file.name;
            
            const encoding = document.getElementById('encoding').value;
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const text = e.target.result;
                processCSV(text);
            };
            reader.readAsText(file, encoding);
        }

        function detectDelimiter(text) {
            const delimiters = [';', ',', '\t'];
            const lines = text.split('\n').slice(0, 5);
            let bestDelimiter = ';';
            let maxCount = -1;

            delimiters.forEach(d => {
                const count = lines[0].split(d).length;
                if (count > maxCount) {
                    maxCount = count;
                    bestDelimiter = d;
                }
            });
            return bestDelimiter;
        }

        function processCSV(text) {
            try {
                const selectedDelimiter = document.getElementById('delimiter').value;
                const delimiter = selectedDelimiter === 'auto' ? detectDelimiter(text) : selectedDelimiter;
                
                // Verbeterde Regex voor CSV parsing (handelt quotes en speciale tekens goed af)
                const rawRows = text.split(/\r?\n/).filter(row => row.trim() !== "");
                
                const parsedData = rawRows.map(row => {
                    const result = [];
                    let current = '';
                    let inQuotes = false;
                    for (let i = 0; i < row.length; i++) {
                        const char = row[i];
                        if (char === '"') {
                            if (inQuotes && row[i+1] === '"') { // Handelt "" af als escape quote
                                current += '"';
                                i++;
                            } else {
                                inQuotes = !inQuotes;
                            }
                        } else if (char === delimiter && !inQuotes) {
                            result.push(current.trim());
                            current = '';
                        } else {
                            current += char;
                        }
                    }
                    result.push(current.trim());
                    return result;
                });

                headers = parsedData[0];
                currentData = parsedData.slice(1);
                filteredData = [...currentData];
                
                // Reset column selection (alles aan standaard)
                selectedColumnIndices = headers.map((_, i) => i);
                
                setupColumnSelector();
                renderTable();
                
                convertBtn.disabled = false;
                emptyState.classList.add('hidden');
                columnSelectorSection.classList.remove('hidden');
                showMessage(`CSV geladen met ${headers.length} kolommen en ${currentData.length} rijen.`, "success");
            } catch (err) {
                showMessage("Fout bij verwerken: " + err.message, "error");
            }
        }

        function setupColumnSelector() {
            columnCheckboxes.innerHTML = headers.map((h, i) => `
                <label class="flex items-center gap-3 p-2 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors border border-transparent hover:border-slate-100">
                    <input type="checkbox" checked value="${i}" class="w-4 h-4 rounded text-emerald-600 focus:ring-emerald-500 accent-emerald-600" onchange="toggleColumn(${i})">
                    <span class="text-xs font-medium text-slate-700 truncate" title="${escapeHtml(h)}">${escapeHtml(h) || 'Kolom ' + (i+1)}</span>
                </label>
            `).join('');
            lucide.createIcons();
        }

        window.toggleColumn = function(index) {
            const idx = parseInt(index);
            if (selectedColumnIndices.includes(idx)) {
                selectedColumnIndices = selectedColumnIndices.filter(i => i !== idx);
            } else {
                selectedColumnIndices.push(idx);
                selectedColumnIndices.sort((a, b) => a - b);
            }
            renderTable();
        };

        function renderTable() {
            if (selectedColumnIndices.length === 0) {
                tableHeader.innerHTML = '<th class="p-4 text-slate-400 italic">Geen kolommen geselecteerd</th>';
                tableBody.innerHTML = '';
                return;
            }

            // Render Headers
            tableHeader.innerHTML = selectedColumnIndices.map(i => 
                `<th class="p-4 border-b border-slate-200 font-bold text-slate-700 whitespace-nowrap bg-slate-50">${escapeHtml(headers[i])}</th>`
            ).join('');

            // Render Body (Top 100)
            const displayData = filteredData.slice(0, 100);
            tableBody.innerHTML = displayData.map(row => `
                <tr class="hover:bg-slate-50 transition-colors">
                    ${selectedColumnIndices.map(i => `<td class="p-4 text-slate-600 border-b border-slate-100 max-w-xs truncate">${escapeHtml(row[i] || "")}</td>`).join('')}
                </tr>
            `).join('');

            rowCount.textContent = `${filteredData.length} rijen gevonden`;
        }

        function filterData(query) {
            const q = query.toLowerCase();
            filteredData = currentData.filter(row => 
                row.some(cell => String(cell).toLowerCase().includes(q))
            );
            renderTable();
        }

        function exportToExcel() {
            if (selectedColumnIndices.length === 0) {
                showMessage("Selecteer ten minste één kolom om te exporteren.", "error");
                return;
            }

            try {
                const wb = XLSX.utils.book_new();
                
                // Filter headers en data op basis van kolomselectie
                const exportHeaders = selectedColumnIndices.map(i => headers[i]);
                const exportData = filteredData.map(row => 
                    selectedColumnIndices.map(i => row[i])
                );

                const wsData = [exportHeaders, ...exportData];
                const ws = XLSX.utils.aoa_to_sheet(wsData);

                // Auto-fit kolom breedte
                const colWidths = exportHeaders.map((h, i) => {
                    let maxLen = h.length;
                    for(let r = 0; r < Math.min(wsData.length, 30); r++) {
                        const cellVal = String(wsData[r][i] || "");
                        if (cellVal.length > maxLen) maxLen = cellVal.length;
                    }
                    return { wch: Math.min(maxLen + 2, 50) };
                });
                ws['!cols'] = colWidths;

                XLSX.utils.book_append_sheet(wb, ws, "Gefilterde Data");
                
                const originalName = fileNameDisplay.textContent.split('.')[0] || 'export';
                XLSX.writeFile(wb, `${originalName}_gefilterd.xlsx`);
                
                showMessage("Excel succesvol gedownload!", "success");
            } catch (err) {
                showMessage("Export mislukt: " + err.message, "error");
            }
        }

        function showMessage(msg, type) {
            statusMessage.textContent = msg;
            statusMessage.className = `p-4 rounded-xl text-sm font-medium border animate-slide-up block `;
            
            if (type === 'success') {
                statusMessage.classList.add('bg-emerald-50', 'text-emerald-700', 'border-emerald-200');
            } else {
                statusMessage.classList.add('bg-red-50', 'text-red-700', 'border-red-200');
            }

            setTimeout(() => statusMessage.classList.add('hidden'), 5000);
        }

        function escapeHtml(text) {
            if (text === null || text === undefined) return "";
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
